<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منظومة ثانوية المنصور الذهبي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #1e3a8a; 
            --accent-yellow: #facc15; 
            --bg-dark: #0f172a;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: #f1f5f9;
            margin: 0; padding: 20px;
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh;
        }

        /* حاوية الإطار المضيء الدوار بأربعة ألوان */
        .animated-border-box {
            position: relative;
            width: 100%;
            max-width: 520px;
            padding: 5px; 
            background: rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 15px 40px rgba(0,0,0,0.15);
        }

        .animated-border-box::before {
            content: '';
            position: absolute;
            width: 200%; height: 200%;
            background: conic-gradient(
                #1e3a8a, /* الأزرق الملكي */
                #facc15, /* الأصفر الذهبي */
                #3b82f6, /* الأزرق السماوي */
                #eab308  /* الذهبي المعتق */
            );
            left: -50%; top: -50%;
            animation: rotate 4s linear infinite;
        }

        @keyframes rotate { 100% { transform: rotate(360deg); } }

        .container {
            position: relative;
            background: #ffffff;
            border-radius: 25px;
            overflow: hidden;
            z-index: 1;
        }

        .glass-header {
            background: linear-gradient(135deg, var(--primary-blue) 0%, #1e40af 100%);
            padding: 25px 20px;
            text-align: center;
            color: white;
            border-bottom: 6px solid var(--accent-yellow);
        }

        /* معالجة الشعار المستطيل الكبير */
        .logo-rect {
            width: 100%;
            max-width: 420px; 
            height: auto;
            max-height: 150px; 
            object-fit: contain;
            margin-bottom: 15px;
            filter: drop-shadow(0 2px 8px rgba(250, 204, 21, 0.4));
        }

        .glass-header h1 { margin: 0; font-size: 1.4rem; color: var(--accent-yellow); font-weight: 900; }

        .form-body { padding: 30px; }

        .input-wrapper { margin-bottom: 20px; }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 700;
            font-size: 0.85rem;
            color: var(--primary-blue);
        }

        input, select {
            width: 100%;
            padding: 14px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 1rem;
            font-family: 'Cairo', sans-serif;
            background: #fdfdfd;
            box-sizing: border-box;
            transition: 0.3s;
        }

        input:focus, select:focus { border-color: var(--primary-blue); outline: none; background: #fff; }

        .main-btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 15px;
            font-size: 1.1rem;
            font-weight: 900;
            color: var(--primary-blue);
            cursor: pointer;
            background: var(--accent-yellow);
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(250, 204, 21, 0.3);
            font-family: 'Cairo', sans-serif;
        }

        .main-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(250, 204, 21, 0.5); }
        .main-btn:disabled { background: #cbd5e1; color: #64748b; cursor: not-allowed; }

        .shake { animation: shake 0.4s ease-in-out; border-color: #ef4444 !important; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }

        #registration-fields { display: none; }
        .teacher-box { background: #eff6ff; padding: 12px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #dbeafe; text-align: center; color: var(--primary-blue); font-weight: 700; }
        .row { display: flex; gap: 12px; }
        .row > div { flex: 1; }
        
        /* تنسيق زر العودة للرئيسية */
        .back-btn {
            display: block;
            text-align: center;
            margin-top: 15px;
            padding: 14px;
            background: #f8fafc;
            color: var(--primary-blue);
            text-decoration: none;
            font-weight: 800;
            border-radius: 12px;
            border: 2px solid #e2e8f0;
            transition: all 0.3s ease;
            font-size: 0.95rem;
        }
        .back-btn:hover {
            background: #eff6ff;
            border-color: #bfdbfe;
            transform: translateY(-2px);
        }

        .footer-text { text-align: center; margin-top: 25px; font-size: 0.7rem; color: #94a3b8; }
    </style>
</head>
<body>

<div class="animated-border-box">
    <div class="container">
        <div class="glass-header">
            <img src="dahbii.png" alt="Logo" class="logo-rect">
            <h1>ثانوية المنصور الذهبي التأهيلية</h1>
            <p style="color: white; opacity: 0.9; font-size: 0.8rem;">بوابة التوثيق الرقمي الرسمي</p>
        </div>

        <div class="form-body">
            <div id="auth-box">
                <div class="input-wrapper">
                    <label>الرقم المهني (رقم التأجير)</label>
                    <input type="number" id="workId" placeholder="أدخل رقمك المهني للتحقق...">
                    <p id="err-hint" style="color:#ef4444; font-size:0.75rem; display:none; margin-top:6px;">عذراً، الرقم غير مدرج في قاعدة البيانات!</p>
                </div>
                <button class="main-btn" id="loginBtn" onclick="verifyId()">دخول للمنظومة</button>
            </div>

            <div id="registration-fields">
                <div class="teacher-box">مرحباً بالأستاذ(ة): <span id="teacherName"></span></div>
                
                <div class="input-wrapper">
                    <label>المادة الدراسية</label>
                    <input type="text" id="subject" placeholder="مثال: الرياضيات....">
                </div>

                <div class="input-wrapper">
                    <label>مدة الغياب</label>
                    <select id="duration">
                        <option>ساعة واحدة</option>
                        <option>ساعتان</option>
                        <option>نصف يوم</option>
                        <option>يوم كامل</option>
                        <option>أخرى</option>
                    </select>
                </div>

                <div class="row">
                    <div class="input-wrapper">
                        <label>من</label>
                        <select id="fromTime"></select>
                    </div>
                    <div class="input-wrapper">
                        <label>إلى</label>
                        <select id="toTime"></select>
                    </div>
                </div>

                <div class="input-wrapper">
                    <label>إرفاق التبرير الرسمي (صورة/PDF)</label>
                    <input type="file" id="fileInp" accept="image/*,.pdf">
                </div>

                <button class="main-btn" id="subBtn" onclick="submitData()">إرسال التقرير النهائي</button>
            </div>

            <a href="index.html" class="back-btn">⮐ العودة للرئيسية</a>

            <div class="footer-text">جميع الحقوق محفوظة لثانوية المنصور الذهبي © 2026</div>
        </div>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzUnov2MIfKHuQ7lQZApt9f3ITWOIG7vSLAfTfrCvcNSUkNRqciM3sgO5o2fNWXIY0s/exec";

    const times = ["08:30","09:30","10:30","11:30","12:30","14:30","15:30","16:30","17:30","18:30"];
    const fromS = document.getElementById('fromTime');
    const toS = document.getElementById('toTime');
    times.forEach(t => {
        fromS.innerHTML += `<option>${t}</option>`;
        toS.innerHTML += `<option>${t}</option>`;
    });

    let teacherNameStr = "";

    function verifyId() {
        const idInp = document.getElementById('workId');
        const btn = document.getElementById('loginBtn');
        const errHint = document.getElementById('err-hint');
        const id = idInp.value;
        
        if(!id) return;
        
        btn.disabled = true;
        btn.innerText = "جاري الدخول...";
        errHint.style.display = 'none';
        idInp.classList.remove('shake');
        
        fetch(`${SCRIPT_URL}?action=verify&id=${id}`)
        .then(res => res.json())
        .then(data => {
            if(data.success) {
                teacherNameStr = data.name;
                document.getElementById('teacherName').innerText = data.name;
                document.getElementById('auth-box').style.display = 'none';
                document.getElementById('registration-fields').style.display = 'block';
            } else {
                idInp.classList.add('shake');
                errHint.style.display = 'block';
                btn.disabled = false;
                btn.innerText = "دخول للمنظومة";
            }
        })
        .catch(() => {
            alert("فشل الاتصال بالخادم. يرجى المحاولة لاحقاً.");
            btn.disabled = false;
            btn.innerText = "دخول للمنظومة";
        });
    }

    function submitData() {
        const file = document.getElementById('fileInp').files[0];
        if(!file) { alert("يجب إرفاق ملف التبرير لإتمام العملية."); return; }
        
        const subBtn = document.getElementById('subBtn');
        subBtn.disabled = true; 
        subBtn.innerText = "جاري توثيق التقرير...";

        const r = new FileReader();
        r.onload = function(e) {
            const d = {
                teacherName: teacherNameStr,
                subject: document.getElementById('subject').value,
                duration: document.getElementById('duration').value, 
                fromTime: document.getElementById('fromTime').value,
                toTime: document.getElementById('toTime').value,
                fileData: e.target.result.split(',')[1],
                fileName: file.name,
                fileType: file.type
            };
            fetch(SCRIPT_URL, {method:'POST', body:JSON.stringify(d)})
            .then(res => res.text())
            .then(m => { 
                alert("تم التوثيق بنجاح. شكراً لالتزامكم الإداري."); 
                location.reload(); 
            })
            .catch(() => {
                alert("حدث خطأ أثناء الإرسال.");
                subBtn.disabled = false;
                subBtn.innerText = "إرسال التقرير النهائي";
            });
        };
        r.readAsDataURL(file);
    }
</script>
</body>
</html>
